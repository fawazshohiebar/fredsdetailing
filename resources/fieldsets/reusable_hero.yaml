title: 'Reusable Hero'
fields:
  -
    handle: heading
    field:
      buttons:
        - h2
        - h3
        - bold
        - italic
        - color
        - h1
        - h4
        - h5
        - h6
      remove_empty_nodes: false
      type: bard
      display: Heading
      localizable: true
  -
    handle: subheading
    field:
      type: text
      display: Subheading
      localizable: true
  -
    handle: description_text
    field:
      buttons:
        - h2
        - h3
        - bold
        - color
        - h1
        - h4
        - h5
        - h6
      remove_empty_nodes: false
      type: bard
      display: 'Description Text'
      localizable: true
  -
    handle: video
    field:
      type: text
      display: Video
      instructions: 'Can be URL or YouTube ID'
      localizable: true
      default: 'https:// or YOUTUBE_ID'
  -
    handle: starting_time
    field:
      type: integer
      display: 'Starting Time'
      localizable: false
      width: 50
      unless:
        video: 'contains http'
  -
    handle: ending_time
    field:
      type: integer
      display: 'Ending Time'
      localizable: false
      width: 50
      unless:
        video: 'contains http'
  -
    handle: first_button
    field:
      type: group
      display: 'first Button'
      localizable: true
      fields:
        -
          import: fancy_button
  -
    handle: second_button
    field:
      type: group
      display: 'Second Button'
      localizable: true
      fields:
        -
          import: fancy_button
  -
    handle: more_info
    field:
      type: group
      display: 'More Info'
      localizable: true
      fields:
        -
          handle: info_year
          field:
            type: text
            display: 'Info Year'
            localizable: false
        -
          handle: info_date
          field:
            type: text
            display: 'Info Date'
            localizable: false
        -
          handle: info_location
          field:
            buttons:
              - h2
              - h3
              - bold
              - color
              - h1
              - h4
            remove_empty_nodes: false
            type: bard
            display: 'Info Location'
            localizable: false
