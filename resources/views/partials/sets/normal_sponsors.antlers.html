<section class="bg-light-accent py-15">
<div class="adnec-container ">
                        {{ partial:partials/sets/heading_group_with_breadcrumbs }}

    <div class="flex flex-col gap-5">
    {{ sponsors_creator }}

    <div class="   flex flex-col md:flex-row gap-5 border-[#bbcae1] border-1 p-5">
        <div class=" min-w-[150px] lg:min-w-[200px] flex flex-row justify-start"> 
            <a href="{{sponsors_website_link}}">
            <img class="h-35  object-contain " src="{{ sponsors_logos:url }}" alt="">
            </a>
        </div>
        <div>
           <div class="text-primary text-sm uppercase ltr:tracking-wider font-[500] mb-3" >{{ sponsors_title }}</div>
           <div class="text-primary text-md   ltr:tracking-wider font-[800]" >{{ sponsors_name}}</div> 
           <div class="text-[14px]" x-data="{ 
               expanded: false,
               contentHeight: 0,
               collapsedHeight: 48,
               init() {
                   this.$nextTick(() => {
                       this.contentHeight = this.$refs.content.scrollHeight;
                   });
               }
           }">
               <div 
                   class="overflow-hidden transition-all duration-500 ease-in-out"
                   :style="expanded ? `max-height: ${contentHeight}px` : `max-height: ${collapsedHeight}px`"
               >
                   <div x-ref="content">
                       {{ sponsors_description }}
                   </div>
               </div>
               <button 
                   @click="expanded = !expanded" 
                   class="text-sm text-primary  mt-2 cursor-pointer flex items-center gap-1 transition-all duration-300"
               >
                   <span class="customcolors" x-text="expanded ? 'Read less' : 'Read more'"></span>
                   <svg 
                       class="w-4 h-4 transition-transform duration-300" 
                       :class="expanded ? 'rotate-180' : ''"
                       fill="none" 
                       stroke="currentColor" 
                       viewBox="0 0 24 24"
                   >
                       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                   </svg>
               </button>
           </div>
        </div>
    </div>   

    {{ /sponsors_creator }}
</div>
</div>
</section>
