title: Sponsors
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              localizable: true
              validate:
                - required
          -
            import: background_design
          -
            import: heading_group_with_breadcrumbs
          -
            handle: sponsors_entries
            field:
              collections:
                - sponsors
              type: entries
              display: 'Sponsors Entries'
              localizable: false
          -
            import: button_group
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
