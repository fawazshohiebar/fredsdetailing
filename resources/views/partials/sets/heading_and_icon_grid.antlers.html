<div style="{{ if background == 'bgimg' }}background-image: url('{{ image.url }}');{{ else }}background-color: var(--color-{{ background_color }});{{ /if }}"
    class="w-full  bg-cover bg-center ">
    <div class="adnec-container py-10">
    <div class="custom text-center mb-8"> {{ heading }}</div>
    <div class=" grid   grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 border-1 border-[#bbcae1]">
        {{ grid_items }}
            <div class="icon-grid-item group cursor-pointer flex flex-col items-center justify-center gap-5 p-8 border-1 border-[#bbcae1]">
                <div class="svg-icon-wrapper transition-all duration-300 items-center">
                    <img src="{{ grid_image:url }}" alt="" class="svg-icon">
                </div>
                <div class="text-center text-base font-mont text-primary font-[600] svgtext">{{ grid_text }}</div>
            </div>
        {{ /grid_items }}
    </div>
{{if group_buttons}}
<div class="flex justify-center py-8">
{{group_buttons}}
{{ partial:partials/sets/fancy_button }}
{{/group_buttons}}
</div>
{{/if}}
</div>







    <style>
        .svg-icon-wrapper img {
            transition: filter 0.3s ease;
        }
 
        .group:hover .svg-icon-wrapper img {
            filter: brightness(0) saturate(100%) invert(100%);
        }
         .group:hover .svgtext{
            color:white;
         }

        .icon-grid-item {
            transition: background 0.3s ease;
        }

        .icon-grid-item:hover {
            background: var(--color-second-gradient);
        }
    </style>

</div>
