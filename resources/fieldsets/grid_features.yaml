title: 'Grid Features'
fields:
  -
    import: background_design
  -
    import: heading_group_with_breadcrumbs
  -
    handle: grid_creator
    field:
      type: replicator
      display: 'Grid Creator'
      localizable: true
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            grid_set:
              display: 'Grid Set'
              fields:
                -
                  handle: image
                  field: basics.image
                  config:
                    validate:
                      - image
                      - 'max_filesize:9216'
                      - 'mimes:png,jpg,jpeg,gif,webp,svg'
                -
                  handle: heading
                  field:
                    type: text
                    display: Heading
                    localizable: false
                -
                  handle: description
                  field:
                    buttons:
                      - h2
                      - h3
                      - bold
                      - color
                      - h1
                      - h4
                      - h5
                      - h6
                    remove_empty_nodes: false
                    type: bard
                    display: Description
                    localizable: false
