tabs:
  main:
    display: Main
    sections:
      -
        display: Brand
        instructions: 'Brand settings'
        fields:
          -
            handle: title
            field:
              type: text
              display: Title
              instructions: 'The title of the brand'
              localizable: true
              validate:
                - required
          -
            handle: logo
            field:
              type: assets
              display: Logo
              instructions: 'The logo of the brand'
              max_files: 1
              width: 50
              container: collaterals
              folder: /brand
              localizable: false
              validate:
                - image
                - 'mimes:jpg,jpeg,png,gif,webp,svg'
          -
            handle: logo_dark
            field:
              type: assets
              display: 'Logo Dark Mode'
              instructions: 'The logo of the brand for dark mode'
              max_files: 1
              width: 50
              container: collaterals
              folder: /brand
              localizable: false
              validate:
                - image
                - 'mimes:jpg,jpeg,png,gif,webp,svg'
          -
            handle: button_replicator
            field:
              type: replicator
              display: 'Button  Replicator'
              localizable: false
              sets:
                new_set_group:
                  display: 'New Set Group'
                  sets:
                    button:
                      display: Button
                      fields:
                        -
                          import: fancy_button
      -
        display: 'Extra Event Info'
        fields:
          -
            handle: footer_sales
            field:
              type: replicator
              display: 'Footer Sales'
              localizable: false
              sets:
                new_set_group:
                  display: 'New Set Group'
                  sets:
                    sales_set:
                      display: 'Sales Set'
                      fields:
                        -
                          handle: sales_label
                          field:
                            type: text
                            display: 'Sales Label'
                            localizable: false
                            width: 66
                        -
                          handle: link
                          field:
                            type: link
                            display: Link
                            localizable: false
                            width: 50
                        -
                          handle: sales_text
                          field:
                            type: text
                            display: 'Sales Text'
                            localizable: false
                            width: 50
                        -
                          handle: icon
                          field: basics.icon
                          config:
                            width: 33
          -
            handle: footer_text
            field:
              buttons:
                - h2
                - h3
                - bold
                - color
                - h1
                - h4
                - h5
                - h6
              remove_empty_nodes: false
              type: bard
              display: 'Footer Text'
              localizable: false
          -
            handle: logos_and_partners
            field:
              type: replicator
              display: 'Logos and partners'
              localizable: false
              sets:
                new_set_group:
                  display: 'New Set Group'
                  sets:
                    new_set:
                      display: 'New Set'
                      fields:
                        -
                          handle: title
                          field:
                            type: text
                            display: Title
                            localizable: false
                        -
                          handle: logo
                          field:
                            type: replicator
                            display: Logo
                            localizable: false
                            sets:
                              new_set_group:
                                display: 'New Set Group'
                                sets:
                                  new_set:
                                    display: 'New Set'
                                    fields:
                                      -
                                        handle: title
                                        field:
                                          type: text
                                          display: Title
                                          localizable: false
                                          width: 33
                                      -
                                        handle: image
                                        field:
                                          container: collaterals
                                          type: assets
                                          display: Image
                                          localizable: false
                                          width: 33
                                      -
                                        handle: url
                                        field:
                                          type: link
                                          display: Url
                                          localizable: false
                                          width: 33
          -
            import: form_box
      -
        display: 'Footer Logos'
        fields:
          -
            handle: social_media
            field:
              type: grid
              display: 'Social Media'
              localizable: false
              fields:
                -
                  handle: platform
                  field:
                    options:
                      -
                        key: facebook
                        value: null
                      -
                        key: twitter
                        value: null
                      -
                        key: instagram
                        value: null
                      -
                        key: linkedin
                        value: null
                      -
                        key: youtube
                        value: null
                      -
                        key: snapchat
                        value: null
                      -
                        key: tiktok
                        value: null
                    type: select
                    display: Platform
                    localizable: false
                    width: 50
                -
                  handle: social_media_link
                  field:
                    type: text
                    display: 'Social Media Link'
                    localizable: false
                    width: 50
          -
            handle: footer_ending_text
            field:
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - color
                - h1
                - h4
                - h5
                - h6
              remove_empty_nodes: false
              type: bard
              display: 'footer Ending Text'
              localizable: false
