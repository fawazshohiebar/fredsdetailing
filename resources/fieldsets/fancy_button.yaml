title: 'Fancy Button'
fields:
  -
    handle: link
    field:
      type: link
      display: Link
      localizable: false
      width: 50
      container: assets
  -
    handle: label
    field:
      type: text
      display: Label
      localizable: false
      width: 50
  -
    handle: design
    field:
      options:
        -
          key: whitefilled
          value: 'White Filled'
        -
          key: whiteoutlined
          value: 'White Outlined'
        -
          key: Orangenogradient
          value: 'Orange without gradient'
        -
          key: whiterounded
          value: 'White Filled Rounded'
        -
          key: greengradient
          value: 'Gradient Green'
        -
          key: blackbggroup
          value: 'group black'
        -
          key: whitebgblacksvg
          value: 'White Background Black Bg'
        -
          key: whitefilledbluetxt
          value: 'white bg blue txt'
        -
          key: bluebgwhitetxt
          value: 'blue bg white txt'
        -
          key: blackbgwhitetxt
          value: 'black bg white txt'
      type: select
      display: Design
      localizable: false
      width: 25
  -
    handle: icon
    field: basics.icon
    config:
      width: 25
  -
    handle: open_new_tab
    field:
      type: toggle
      display: 'Open New Tab'
      localizable: false
      width: 25
  -
    handle: button_size
    field:
      options:
        -
          key: fit
          value: Fit
        -
          key: lg
          value: Large
      type: select
      display: 'Button Size'
      localizable: false
      width: 25
