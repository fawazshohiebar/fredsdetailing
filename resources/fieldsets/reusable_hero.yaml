title: 'Reusable Hero'
fields:
  -
    handle: heading
    field:
      buttons:
        - h2
        - h3
        - bold
        - italic
        - color
        - h1
        - h4
        - h5
        - h6
      remove_empty_nodes: false
      type: bard
      display: Heading
      localizable: true
  -
    handle: subheading
    field:
      type: text
      display: Subheading
      localizable: true
  -
    handle: description_text
    field:
      buttons:
        - h2
        - h3
        - bold
        - color
        - h1
        - h4
        - h5
        - h6
      remove_empty_nodes: false
      type: bard
      display: 'Description Text'
      localizable: true
  -
    handle: video
    field:
      type: text
      display: Video
      instructions: 'Can be URL or YouTube ID'
      localizable: true
      default: 'https:// or YOUTUBE_ID'
  -
    handle: starting_time
    field:
      type: integer
      display: 'Starting Time'
      localizable: false
      width: 50
      unless:
        video: 'contains http'
  -
    handle: ending_time
    field:
      type: integer
      display: 'Ending Time'
      localizable: false
      width: 50
      unless:
        video: 'contains http'
  -
    import: button_group
  -
    handle: date_and_location
    field:
      type: replicator
      display: 'Date and Location'
      localizable: false
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            new_set:
              display: 'New Set'
              fields:
                -
                  handle: icon
                  field: basics.icon
                  config:
                    width: 50
                -
                  handle: info_text
                  field:
                    buttons:
                      - h2
                      - h3
                      - bold
                      - color
                      - h1
                      - h4
                      - h5
                      - h6
                    remove_empty_nodes: false
                    type: bard
                    display: 'info Text'
                    localizable: false
                    width: 50
