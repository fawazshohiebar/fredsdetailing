<div style="{{ if background == 'bgimg' }}background-image: url('{{ image.url }}');{{ else }}background-color: var(--color-{{ background_color }});{{ /if }}"
    class="w-full  bg-cover bg-center ">

    <div class="adnec-container py-10">

        {{ partial:partials/sets/heading_group_with_breadcrumbs }}
        <div class="grid  grid-cols-2 lg:grid-cols-3 gap-2">
            {{ grid_creator }}
                <div style="background-image: url('{{ image:url }}');" class="bg-cover bg-center overflow-hidden rounded-2xl min-h-90 flex flex-end justify-end flex-col relative"> 
                    <!-- Gradient overlay -->
                    <div class="absolute inset-0 bg-[linear-gradient(365deg,#000_3.9%,rgba(0,0,0,0.40)_36.53%,rgba(0,0,0,0.00)_46.16%)]"></div>
                    <!-- Content -->
                    <div class="relative z-10 p-4 flex flex-col gap-4">
                        <div class="w-15 h-[3px] bg-back-gradient"></div>
                        <div class="text-white font-bold text-lg font-mont uppercase"> {{ heading }}</div>
                        <div class="text-white leading-5 text-base font-mont "> {{ description }}</div>
                    </div>
                </div>
            {{ /grid_creator }}
        </div>

    </div>
</div>
