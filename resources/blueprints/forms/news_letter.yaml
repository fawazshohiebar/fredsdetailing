tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: email
            field:
              input_type: email
              autocomplete: email
              type: text
              display: Email
              localizable: false
              placeholder: 'Enter your email'
              validate:
                - required
          -
            handle: turnstile_token
            field: basics.turnstile_token
          -
            handle: utm_url
            field: basics.utm_url
