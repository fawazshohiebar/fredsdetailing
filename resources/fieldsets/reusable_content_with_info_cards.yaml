title: 'Reusable Content with Info Cards'
fields:
  -
    import: heading_group_with_breadcrumbs
  -
    handle: info_cards
    field:
      type: replicator
      display: 'Info Cards'
      max_sets: 20
      localizable: true
      sets:
        main:
          display: Main
          sets:
            info_card:
              display: 'Info Card'
              fields:
                -
                  handle: icon_type
                  field:
                    type: select
                    display: 'Icon Type'
                    default: heroicon
                    options:
                      -
                        key: heroicon
                        value: Heroicon
                      -
                        key: image
                        value: Image
                    width: 50
                    localizable: false
                -
                  handle: icon
                  field: basics.icon
                  config:
                    width: 50
                    if:
                      icon_type: 'equals heroicon'
                -
                  handle: image
                  field:
                    type: assets
                    display: 'Icon Image'
                    max_files: 1
                    container: collaterals
                    folder: icons
                    restrict: true
                    allowed_extensions:
                      - svg
                      - png
                      - jpg
                      - webp
                    width: 50
                    localizable: false
                    if:
                      icon_type: 'equals image'
                    validate:
                      - image
                      - 'mimes:png,jpg,jpeg,gif,webp'
                -
                  handle: heading
                  field:
                    type: text
                    display: 'Card Heading'
                    localizable: true
                -
                  handle: description
                  field:
                    type: textarea
                    display: 'Card Description'
                    localizable: true
  -
    handle: cta_actions
    field: basics.buttons
    config:
      display: 'Call to Action'
      sets:
        new_set_group:
          display: 'New Set Group'
          instructions: null
          icon: null
          sets:
            button:
              display: Button
              instructions: null
              icon: null
              hide: null
              fields:
                -
                  import: fancy_button
      width: 100
