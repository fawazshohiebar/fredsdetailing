{{# Schedule Content #}}
<div class="">
    <template x-for="timeSlot in getCurrentDaySchedule()" :key="timeSlot.time">
        <div class="flex flex-col md:flex-row mb-8 md:mb-16">
            {{# Time - Mobile: Sticky top, Desktop: Side #}}
            {{# <div class="w-full md:w-36 flex-shrink-0 mb-4 md:mb-0 sticky top-36 z-10 h-fit">
                <div class="bg-[#F3F3F3] md:bg-[#838383]/10 rounded-xl px-4 py-3 flex items-center justify-center space-x-2">
                    {{heroicon:outline:clock class="text-gray-600 w-5 h-5 md:w-6 md:h-6 stroke-2"}}
                    <span class="text-lg md:text-base font-semibold" style="unicode-bidi: plaintext;" x-text="timeSlot.time"></span>
                </div>
            </div> #}}
 
            {{# Events #}}
            {{# ltr:md:ml-16 rtl:md:mr-16 #}}
            <div class="flex-1 ">
                {{# Mobile: Single column, Desktop: Grid layout #}}
                <div class="flex flex-col gap-4 md:grid md:gap-4" :class="timeSlot.events.length > 1 ? 'lg:grid-cols-2' : 'lg:grid-cols-1'">
                    <template x-for="event in timeSlot.events" :key="event.id">
                        <div :data-session-id="event.id" class="bg-[#ECF2F7] border border-white/20 rounded-xl p-4 lg:p-6 transition-all">
                            {{# Program Badge and Date - Only shown when searching #}}
                            <div x-show="event.programName || event.dayDate" class="mb-3 flex flex-wrap gap-2">
                                <span x-show="event.programName" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-back-gradient text-white">
                                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                                    </svg>
                                    <span x-text="event.programName"></span>
                                </span>
                                <span x-show="event.dayDate" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-[#303F51] text-white">
                                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                    </svg>
                                    <span x-text="`Day ${event.dayNumber} - ${event.dayDate}`"></span>
                                </span>
                            </div>
                            
                            {{# Hall info and Share Button #}}
                            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 md:mb-6 gap-2">
                                <div x-show="event.duration" class="bg-white border border-white rounded-xl px-3 md:px-4 py-1 md:py-1.5 self-start sm:self-auto flex flex-col gap-2 w-full flex-1">
                                    <div class="flex flex-row items-center gap-[5px]">
                                    {{heroicon variant="outline" icon="clock" class="h-4 w-4"}}
                                    <span class="text-sm md:text-base font-audio flex-nowrap text-nowrap" style="unicode-bidi: plaintext;" x-text="event.duration"></span>
                                     </div>
                                    <span class="text-sm md:text-base font-mont font-semibold customcolors flex-nowrap text-nowrap" style="unicode-bidi: plaintext;" x-text="event.hall"></span>
                                
                                
                                 <button 
                                    @click="openShareModal(event.share_url, event.title, event.slug)"
                                    class="bg-[#ECF2F7]  border border-white rounded-xl px-3 md:px-4 py-2 hover:bg-gray-50 transition-colors self-start sm:self-auto flex  items-center gap-2 group w-fit"
                                    title="Share this session">
                                    {{ heroicon variant="outline" icon="share" class="h-4 w-4 text-primary group-hover:text-primary-600" }}
                                    <span class="text-sm font-mont text-primary group-hover:text-primary-600">{{ 'Share' | trans }}</span>
                                </button>
                                </div>
                                
                                {{# Share Button #}}
                               
                            </div>

                            {{# Event content #}}
                            <div class="bg-white rounded-lg p-4 md:p-6">
                                <h3 class="text-base  font-mont tracking-wider uppercase font-bold text-primary leading-tight" x-text="event.title"></h3>

                                <div x-show="event.description" class="  pt-4 md:pt-2">
                                    <div class="prose prose-sm md:prose-lg max-w-none text-base font-normal font-mont text-primary" x-html="event.description"></div>
                                </div>

                                <div x-show="event.speakers && event.speakers.length > 0" class=" mt-4 md:mt-6 ">
                                    {{# <h4 class="font-semibold text-gray-900 mb-3 md:mb-4 text-sm md:text-base" x-text="event.speakers.length === 1 ? 'Speaker' : 'Speakers'"></h4> #}}
                                    <div class="space-y-3 md:space-y-4">
                                        <template x-for="speaker in event.speakers" :key="speaker.name">
                                            <div class="border-t-[1px]  border-[#17202b52]  pt-4 flex items-center space-x-1 md:space-x-2">
                                                                            <div class="w-12 h-12 md:w-16 md:h-16 rounded-full bg-cover flex-shrink-0"
                                                                                :style="speaker.speaker_background ? `background-color: ${speaker.speaker_background}` : ''">
                                                <div class="w-12 h-12 md:w-16 md:h-16  rounded-full bg-cover flex-shrink-0"
                                                    :style="speaker.image ? `background-image: url('${speaker.image}')` : 'background-color: #ccc'"></div>
                                               </div>
                                                    <div class="min-w-0 flex-1">
                                                    <div class="text-primary font-bold uppercase text-xs md:text-sm lg:text-base leading-tight" x-text="speaker.name"></div>
                                                    <div class="text-primary font-mont font-normal text-xs md:text-xs lg:text-sm leading-tight mt-1" x-text="speaker.title"></div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>
</div>
