tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: first_name
            field:
              autocomplete: given-name
              type: text
              display: 'First Name'
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: last_name
            field:
              autocomplete: family-name
              type: text
              display: 'Last Name'
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: email
            field:
              input_type: email
              autocomplete: email
              type: text
              display: Email
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: phone
            field:
              input_type: tel
              autocomplete: tel
              type: text
              display: Phone
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: company
            field:
              type: text
              display: Company
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: position
            field:
              type: text
              display: Position
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: city
            field:
              autocomplete: address-level1
              type: text
              display: City
              localizable: false
              width: 50
              validate:
                - required
          -
            handle: country
            field:
              options:
                -
                  key: AE
                  value: 'United Arab Emirates'
              default: AE
              type: select
              display: Country
              localizable: false
              width: 50
          -
            handle: sector
            field:
              options:
                -
                  key: 'Boat Builder'
                  value: 'Boat Builder'
                -
                  key: 'Boat Dealer'
                  value: 'Boat Dealer'
                -
                  key: 'Boat Charter'
                  value: 'Boat Charter'
                -
                  key: 'Marinas & Services'
                  value: 'Marinas & Services'
                -
                  key: 'Engines, Equipment & Accessories'
                  value: 'Engines, Equipment & Accessories'
                -
                  key: 'Finance & Insurance'
                  value: 'Finance & Insurance'
                -
                  key: 'Travel, Tourism & Destinations'
                  value: 'Travel, Tourism & Destinations'
                -
                  key: 'Government Agencies & Associations'
                  value: 'Government Agencies & Associations'
                -
                  key: 'Water Sports'
                  value: 'Water Sports'
                -
                  key: 'Waterfront Development & Real Estate'
                  value: 'Waterfront Development & Real Estate'
                -
                  key: 'Marina Lifestyle Retails'
                  value: 'Marina Lifestyle Retails'
                -
                  key: 'Training & Sea Schools'
                  value: 'Training & Sea Schools'
                -
                  key: Other
                  value: Other
              placeholder: 'Select Option Below'
              type: select
              display: Sector
              localizable: false
              validate:
                - required
          -
            handle: space_options
            field:
              options:
                -
                  key: Indoor
                  value: Indoor
                -
                  key: 'Outdoor (land)'
                  value: 'Outdoor (land)'
                -
                  key: Marina
                  value: Marina
              placeholder: 'Select Option Below'
              type: select
              display: 'Space Options'
              localizable: false
              validate:
                - required
          -
            handle: additional_branding_opportunities_exist
            field:
              options:
                -
                  key: "I'm interested in learning more"
                  value: null
              type: checkboxes
              display: 'Additional Branding Opportunities Exist'
              localizable: false
          -
            handle: message
            field:
              type: textarea
              display: Message
              localizable: false
          -
            handle: turnstile_token
            field: basics.turnstile_token
          -
            handle: utm_url
            field: basics.utm_url
